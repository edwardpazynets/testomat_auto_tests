[pytest]

# Requires pytest version 8.0 or higher; fails if older version is used
minversion = 8.0

# Specifies the directory where pytest looks for tests (the tests/ folder)
testpaths = tests

# Defines filename patterns for test file discovery
python_files = tests_*.py *_test.py *_tests.py

# Defines function naming pattern - only functions starting  with test_ are collected as tests
python_functions = test_*

# Directories to skip during test collection to speed up discovery
norecursedirs = .git .venv .idea __pycache__ build dist

# Default command-line options applied to every pytest run
addopts =
# Verbose output - shows individual test names
    -v
# Shows summary of all test outcomes expect passed (r=report, a=all except passed)
    -ra
# Raises error if using undefined markers (enforces marker registration)
    --strict-markers
# Excludes sandbox/experimental tests from default runs
    -m "not sandbox"
# Short traceback format for failures (less verbose than full)
    --tb=short
# Playwright: ruins browser in visible mode (not headless)
    --headed
# Playwright: enables trace recording for debugging
    --tracing=retain-on-failure
# Playwright: captures screenshots (typically on failure)
    --screenshot=on
# Playwright: directory for trace files
    --output=C:/Users/espada/PycharmProjects/testomat_auto_tests/test_result/traces/
# pytest-html plugin: generates HTML report at this path
    --html=C:/Users/espada/PycharmProjects/testomat_auto_tests/test_result/report.html
# Embeds CSS/JS in HTML report (single file, no external dependencies)
    --self-contained-html



# Registers custom markers to categorize tests
markers =
# Marker for quick smoke tests
    smoke: Quick smoke test for basic functionality
# Marker for API tests
    api: API tests using requests client
# Marker for full regression suite
    regression: Full regression test suite
# Marker for web UI tests
    web: Web UI tests using Playwright
# Marker for long-running tests
    slow: Tests that take longer to execute
# Marker for isolated sandbox and codegen tests
    sandbox: Experimental/sandbox tests excluded from default test runs

# Shows progress bar/dots during test run instead of verbose list
console_output_style = progress

# Enables live logging to console during test execution
log_cli = true

# Minimum log level to display (INFO and ebove)
log_cli_level = INFO

# Log message format with timestamp and level
log_cli_format = %(asctime)s [%(levelname)s] %(message)s

# Date/time format for log timestamps
log_cli_date_format = %Y-%m-%d %H:%M:%S

# If a test marked @pytest.mark.xfail unexpectedly pases, it fails the suite (prevents stale xfails)
xfail_strict = true

